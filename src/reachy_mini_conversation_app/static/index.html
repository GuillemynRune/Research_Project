<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reachy Mini - Monitoring Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      body {
        margin: 0;
        padding: 20px;
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      
      .dashboard-container {
        max-width: 1600px;
        margin: 0 auto;
      }
      
      .dashboard-header {
        margin-bottom: 20px;
        padding: 20px;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      .dashboard-title {
        font-size: 28px;
        font-weight: 600;
        color: #fff;
        margin: 0 0 8px 0;
      }
      
      .dashboard-subtitle {
        font-size: 14px;
        color: #888;
        margin: 0;
      }
      
      .dashboard-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      
      .panel {
        background: #1a1a1a;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      
      .panel-header {
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      
      .panel-title {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .status-badge.live {
        background: rgba(0, 217, 255, 0.2);
        color: #00d9ff;
      }
      
      .panel-content {
        padding: 20px;
      }
      
      #camera-feed {
        width: 100%;
        height: auto;
        border-radius: 8px;
        background: #000;
        display: block;
      }
      
      .camera-container {
        position: relative;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
      }
      
      .camera-overlay {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(0, 0, 0, 0.7);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        color: #00d9ff;
        font-weight: 600;
      }
      
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .stat-label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      
      .stat-value {
        font-size: 20px;
        font-weight: 600;
        color: #00d9ff;
      }
      
      .scrollable-content {
        max-height: 400px;
        overflow-y: auto;
        padding-right: 8px;
      }
      
      .scrollable-content::-webkit-scrollbar {
        width: 6px;
      }
      
      .scrollable-content::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 3px;
      }
      
      .scrollable-content::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
      }
      
      .scrollable-content::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      
      .message {
        margin-bottom: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        border-left: 3px solid;
      }
      
      .message.user {
        border-left-color: #4a9eff;
      }
      
      .message.assistant {
        border-left-color: #00d9ff;
      }
      
      .message-role {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      
      .message.user .message-role {
        color: #4a9eff;
      }
      
      .message.assistant .message-role {
        color: #00d9ff;
      }
      
      .message-content {
        color: #e0e0e0;
        line-height: 1.5;
        font-size: 14px;
      }
      
      .log-entry {
        margin-bottom: 8px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 6px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 12px;
        border-left: 2px solid;
      }
      
      .log-entry.info {
        border-left-color: #00d9ff;
        color: #00d9ff;
      }
      
      .log-entry.warning {
        border-left-color: #ff9500;
        color: #ff9500;
      }
      
      .log-entry.error {
        border-left-color: #ff3b30;
        color: #ff3b30;
      }
      
      .log-timestamp {
        color: #666;
        margin-right: 8px;
      }
      
      .button-group {
        display: flex;
        gap: 8px;
      }
      
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      
      .btn-primary {
        background: #00d9ff;
        color: #000;
      }
      
      .btn-primary:hover {
        background: #00c0e6;
        transform: translateY(-1px);
      }
      
      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      
      .btn-danger {
        background: rgba(255, 59, 48, 0.2);
        color: #ff3b30;
      }
      
      .btn-danger:hover {
        background: rgba(255, 59, 48, 0.3);
      }
      
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #666;
      }
      
      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- Header -->
      <div class="dashboard-header">
        <h1 class="dashboard-title">🤖 Reachy Mini Monitoring Dashboard</h1>
        <p class="dashboard-subtitle">Real-time camera feed, conversation history, and system logs</p>
      </div>
      
      <!-- Main Grid -->
      <div class="dashboard-grid">
        <!-- Left Column: Camera Feed -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">
              📹 Camera Feed
              <span class="status-badge live" id="camera-status">Live</span>
            </div>
          </div>
          <div class="panel-content">
            <div class="camera-container">
              <img id="camera-feed" alt="Camera feed" />
              <div class="camera-overlay" id="fps-display">30 FPS</div>
            </div>
          </div>
        </div>
        
        <!-- Right Column: Stats -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">📊 Statistics</div>
          </div>
          <div class="panel-content">
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Messages</div>
                <div class="stat-value" id="message-count">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Actual FPS</div>
                <div class="stat-value" id="actual-fps">--</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Connection</div>
                <div class="stat-value" id="connection-status">Connected</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="uptime">00:00</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Bottom Grid -->
      <div class="dashboard-grid">
        <!-- Conversation History -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">💬 Conversation History</div>
            <div class="button-group">
              <button class="btn btn-secondary" id="refresh-btn">🔄 Refresh</button>
              <button class="btn btn-danger" id="clear-history-btn">🗑️ Clear</button>
            </div>
          </div>
          <div class="panel-content">
            <div class="scrollable-content" id="conversation-history">
              <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>No messages yet</p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- System Logs -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">📋 System Logs</div>
            <button class="btn btn-secondary" id="clear-logs-btn">Clear</button>
          </div>
          <div class="panel-content">
            <div class="scrollable-content" id="system-logs">
              <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <p>No logs yet</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <script src="/static/camera_monitor_websocket.js"></script>
  </body>
</html>
